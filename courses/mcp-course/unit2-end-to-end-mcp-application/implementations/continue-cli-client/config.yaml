name: ec2-mcp-client
version: 0.0.1
schema: v1

models:
  - name: qwen3-local
    provider: ollama
    model: qwen3:4b
    apiBase: http://127.0.0.1:11434
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 2048

mcpServers:
  - name: sentiment-mcp
    type: sse
    url: http://YOUR_SERVER_PRIVATE_IP:7860/gradio_api/mcp/sse
